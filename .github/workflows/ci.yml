name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
  workflow_call:
  workflow_dispatch:

# Cancel superseded runs of the same ref, but keep master runs queued.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        # Listing every combination explicitly keeps the matrix predictable.
        include:
          - os: ubuntu-latest
            arch: x64
            version: '1.12'
          - os: windows-latest
            arch: x64
            version: '1.12'
          - os: macos-latest
            arch: aarch64
            version: '1.12'

    steps:
      - name: Checkout OMFrontend.jl
        uses: actions/checkout@v4
        with:
          path: OMFrontend.jl

      # Project.toml [sources] (and the transitive [sources] inside DoubleEnded
      # / ListUtil) points at sibling working copies in ../<name>.jl. We lay
      # the siblings out alongside the main checkout so Pkg.resolve finds them.
      - name: Checkout Absyn.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/Absyn.jl
          ref: master
          path: Absyn.jl

      - name: Checkout ArrayUtil.jl
        uses: actions/checkout@v4
        with:
          repository: JKRT/ArrayUtil.jl
          ref: master
          path: ArrayUtil.jl

      - name: Checkout DAE.jl
        uses: actions/checkout@v4
        with:
          repository: JKRT/DAE.jl
          ref: master
          path: DAE.jl

      - name: Checkout DoubleEnded.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/DoubleEnded.jl
          ref: master
          path: DoubleEnded.jl

      - name: Checkout ImmutableList.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/ImmutableList.jl
          ref: master
          path: ImmutableList.jl

      - name: Checkout ListUtil.jl
        uses: actions/checkout@v4
        with:
          repository: JKRT/ListUtil.jl
          ref: master
          path: ListUtil.jl

      - name: Checkout MetaModelica.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/MetaModelica.jl
          ref: master
          path: MetaModelica.jl

      - name: Checkout OMParser.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/OMParser.jl
          ref: master
          path: OMParser.jl

      - name: Checkout OMRuntimeExternalC.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/OMRuntimeExternalC.jl
          ref: master
          path: OMRuntimeExternalC.jl

      - name: Checkout SCode.jl
        uses: actions/checkout@v4
        with:
          repository: OpenModelica/SCode.jl
          ref: master
          path: SCode.jl

      - name: Setup Julia ${{ matrix.version }}-${{ matrix.arch }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2
        with:
          cache-registries: 'true'

      - name: Build
        # bash on every runner so we do not have to escape quotes for PowerShell.
        # Compiled modules are enabled (Julia default) so CI exercises the
        # PrecompileTools @compile_workload that ships with OMFrontend; this
        # mirrors what end users hit on first `using OMFrontend`.
        # We Pkg.develop every sibling because Project.toml [sources] only
        # applies to direct deps; DoubleEnded is a transitive dep (via ListUtil)
        # and otherwise falls back to the registry version, which has [compat]
        # incompatible with the local ImmutableList 0.3.0.
        shell: bash
        working-directory: OMFrontend.jl
        run: |
          julia --color=yes --project -e '
            import Pkg
            Pkg.Registry.add("General")
            Pkg.Registry.add(Pkg.RegistrySpec(url = "https://github.com/OpenModelica/OpenModelicaRegistry.git"))
            siblings = [
              "../Absyn.jl",
              "../ArrayUtil.jl",
              "../DAE.jl",
              "../DoubleEnded.jl",
              "../ImmutableList.jl",
              "../ListUtil.jl",
              "../MetaModelica.jl",
              "../OMParser.jl",
              "../OMRuntimeExternalC.jl",
              "../SCode.jl",
            ]
            Pkg.develop([Pkg.PackageSpec(path = p) for p in siblings])
            Pkg.build(; verbose = true)
            Pkg.resolve()
          '

      - name: Test
        # Drive runtests.jl directly (rather than via Pkg.test) so we reuse
        # the precompile cache from the Build step. Pkg.test would create a
        # sandboxed test environment with a different manifest hash and
        # re-precompile the entire dep graph from scratch -- including the
        # OMFrontend @compile_workload, which loads MSL_4_0_0 and is the
        # most expensive part of the build. Test is already in [deps] so
        # no [extras] merging is needed.
        # --code-coverage=user emits .cov files next to user source for the
        # downstream julia-processcoverage step.
        shell: bash
        working-directory: OMFrontend.jl
        run: |
          julia --color=yes --code-coverage=user --project=. -e '
            include("test/runtests.jl")
          '

      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: OMFrontend.jl/src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
