name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            arch: 'x64'
            version: '1.10'
          - os: ubuntu-latest
            arch: 'x64'
            version: '1.10'
          - os: macos-latest
            arch: 'x64'
            version: '1.10'
    steps:

      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Julia ${{matrix.version}}-${{matrix.arch}}
        uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: actions/cache@v1
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-v${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-

      - name: Build
        # Use bash always to avoid having to escape quotes for Windows
        # We avoid compiled modules for the CI to speed it up a bit...
        shell: bash
        run: julia --compiled-modules=no --color=yes --project -e 'import Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/JKRT/OpenModelicaRegistry.git")); Pkg.build(;verbose = true); Pkg.resolve()'

      - name: Test
        run: julia --compiled-modules=no --color=yes --project -e 'import Pkg; Pkg.add(Pkg.PackageSpec(url="https://github.com/OpenModelica/Absyn.jl.git", rev="master")); Pkg.add(Pkg.PackageSpec(url="https://github.com/OpenModelica/SCode.jl.git", rev="master")); Pkg.resolve(); Pkg.test("Absyn"); Pkg.test("OMParser"); Pkg.test("OMFrontend")'

      - uses: julia-actions/julia-processcoverage@v1

      - name: Coverage report
        uses: codecov/codecov-action@v1
        with:
          file: lcov.info
